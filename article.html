<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Quantum Data & AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #0a0c10;
      --surface: #12161f;
      --border: #1e2532;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --cyan: #00e5ff;
      --violet: #7b2ff7;
      --green: #00e676;
      --orange: #ff9800;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--midnight);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAVBAR */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10,12,16,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 1rem 5%;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--cyan);
    }

    /* ARTICLE CONTAINER */
    .article-container {
      max-width: 900px;
      margin: 120px auto 60px;
      padding: 0 5%;
    }

    .article-header {
      margin-bottom: 3rem;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .article-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      background: rgba(0,229,255,.08);
      border: 1px solid rgba(0,229,255,.2);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
    }

    .article-date {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .article-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--white), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .article-excerpt {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .article-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      margin-bottom: 3rem;
    }

    .article-content h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--white);
      margin: 2.5rem 0 1rem;
    }

    .article-content h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--white);
      margin: 2rem 0 1rem;
    }

    .article-content p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 1.5rem;
    }

    .article-content ul {
      margin: 1.5rem 0;
      padding-left: 2rem;
    }

    .article-content li {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .article-content code {
      font-family: 'Space Mono', monospace;
      background: rgba(0,229,255,.08);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .article-content pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    .article-content pre code {
      background: none;
      padding: 0;
    }

    .article-image {
      width: 100%;
      height: 400px;
      background: linear-gradient(135deg, rgba(0,229,255,.1), rgba(124,92,252,.1));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      margin-bottom: 2rem;
    }

    .author-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .author-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #000;
    }

    .author-info h4 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.25rem;
    }

    .author-info p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .related-articles {
      margin-top: 4rem;
    }

    .related-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .related-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.25s;
      cursor: pointer;
    }

    .related-card:hover {
      border-color: rgba(0,229,255,.3);
    }

    .related-card h4 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
    }

    .related-card p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }

    .error {
      text-align: center;
      padding: 4rem;
      color: var(--orange);
    }

    @media (max-width: 768px) {
      .article-title {
        font-size: 1.8rem;
      }

      .article-content {
        padding: 2rem;
      }

      .author-box {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-content">
      <div class="logo">Quantum Data & AI</div>
      <a href="index.html" class="back-btn">← Retour au site</a>
    </div>
  </nav>

  <!-- ARTICLE CONTAINER -->
  <div class="article-container">
    <div id="articleContent">
      <div class="loading">Chargement de l'article...</div>
    </div>
  </div>

  <script>
    const articleId = new URLSearchParams(window.location.search).get('id');
    let allArticles = []; // Stocke tous les articles pour les recommandations

    async function loadArticle() {
      if (!articleId) {
        showError('Article non trouvé - ID manquant');
        return;
      }

      // Afficher le loader
      document.getElementById('articleContent').innerHTML = `
        <div style="text-align:center;padding:3rem;color:var(--muted);">
          <div style="font-size:2rem;margin-bottom:1rem;">⏳</div>
          <p>Chargement de l'article...</p>
        </div>
      `;

      try {
        // Charger l'article spécifique
        const articleResponse = await fetch(`./api/articles.php?id=${articleId}`);
        const articleResult = await articleResponse.json();
        
        // Charger tous les articles pour les recommandations
        const allResponse = await fetch('./api/articles.php');
        const allResult = await allResponse.json();
        
        if (allResult.success && allResult.data) {
          allArticles = Array.isArray(allResult.data) ? allResult.data : Object.values(allResult.data);
        }
        
        if (articleResult.success && articleResult.data) {
          renderArticle(articleResult.data);
        } else {
          showError('Article non trouvé');
        }
      } catch (error) {
        console.error('Error loading article:', error);
        showError('Erreur lors du chargement de l\'article. Vérifiez votre connexion.');
      }
    }

    function showError(message) {
      document.getElementById('articleContent').innerHTML = `
        <div style="text-align:center;padding:3rem;">
          <div style="font-size:3rem;margin-bottom:1rem;">😕</div>
          <h2 style="color:var(--text);margin-bottom:1rem;">${message}</h2>
          <a href="index.html#blog" style="color:var(--cyan);text-decoration:none;">← Retour au blog</a>
        </div>
      `;
    }

    function renderArticle(article) {
      const container = document.getElementById('articleContent');
      
      // Filtrer les articles similaires (même catégorie ou autres articles)
      const relatedArticles = allArticles
        .filter(a => a.id != articleId) // Exclure l'article actuel
        .slice(0, 2); // Prendre les 2 premiers
      
      // Générer les cartes d'articles similaires
      const relatedHTML = relatedArticles.map(a => `
        <div class="related-card" onclick="window.location.href='article.html?id=${a.id}'" style="cursor:pointer;">
          <span class="article-tag" style="font-size:0.65rem;">${a.category || 'Article'}</span>
          <h4>${a.title}</h4>
          <p>${a.excerpt ? a.excerpt.substring(0, 80) + '...' : 'Lire la suite...'}</p>
        </div>
      `).join('');
      
      container.innerHTML = `
        <div class="article-header">
          <div class="article-meta">
            <span class="article-tag">${article.category || 'Article'}</span>
            <span class="article-date">${article.created_at ? new Date(article.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : ''}</span>
          </div>
          <h1 class="article-title">${article.title}</h1>
          <p class="article-excerpt">${article.excerpt || ''}</p>
        </div>

        <div class="article-image">${article.icon || '📄'}</div>

        <div class="article-content">
          ${article.content || '<p>Contenu en cours de rédaction...</p>'}
        </div>

        <div class="author-box">
          <div class="author-avatar">${article.author ? article.author.substring(0, 2).toUpperCase() : 'QD'}</div>
          <div class="author-info">
            <h4>${article.author || 'Quantum Data & AI'}</h4>
            <p>${article.author_role || 'Expert en Data & IA'}</p>
          </div>
        </div>

        ${relatedArticles.length > 0 ? `
        <div class="related-articles">
          <h3 class="related-title">Articles similaires</h3>
          <div class="related-grid">
            ${relatedHTML}
          </div>
        </div>
        ` : ''}
      `;

      document.title = `${article.title} - Quantum Data & AI`;
    }

    // Load article on page load
    loadArticle();
  </script>
</body>
</html>
